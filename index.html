<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edward Kot — Photographer</title>
  <meta name="description" content="Edward Kot is a photographer based in Milan, working across editorial, commercial, and personal projects throughout Europe.">
  <meta name="keywords" content="photographer Milan, European photographer, editorial photography, commercial photography, Edward Kot">
  <meta property="og:title" content="Edward Kot — Photographer">
  <meta property="og:description" content="Photographer based in Milan. Editorial, commercial, and personal work across Europe.">
  <meta property="og:url" content="https://edwardkot.com">
  <link rel="canonical" href="https://edwardkot.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #f8f6f2;
      --ink: #1a1916;
      --mid: #888580;
      --faint: #e4e1db;
      --accent: #c8a96e;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      opacity: 0;
      animation: fadeIn 0.8s ease forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 3rem;
      mix-blend-mode: multiply;
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      color: var(--ink);
      text-decoration: none;
      text-transform: lowercase;
    }
    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }
    .nav-links a {
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      color: var(--mid);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.25s;
      font-weight: 300;
    }
    .nav-links a:hover { color: var(--ink); }

    /* HERO */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      min-height: 100vh;
      padding: 6rem 2rem 4rem;
      position: relative;
    }
    .hero-eyebrow {
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      color: var(--mid);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      animation: slideUp 0.9s 0.2s ease both;
    }
    .hero-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(4rem, 10vw, 8rem);
      letter-spacing: 0.04em;
      color: var(--ink);
      line-height: 0.9;
      margin-bottom: 2.5rem;
      animation: slideUp 0.9s 0.35s ease both;
    }
    .hero-name em {
      font-style: italic;
      font-weight: 300;
    }
    .hero-rule {
      width: 1px;
      height: 60px;
      background: var(--faint);
      margin: 0 auto 2.5rem;
      animation: growDown 0.8s 0.6s ease both;
    }
    @keyframes growDown { from { transform: scaleY(0); } to { transform: scaleY(1); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

    .hero-ig {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--mid);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      transition: color 0.25s;
      animation: slideUp 0.9s 0.75s ease both;
    }
    .hero-ig:hover { color: var(--ink); }
    .hero-ig svg {
      width: 15px; height: 15px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.4;
      flex-shrink: 0;
    }

    /* FOOTER */
    footer {
      padding: 1.5rem 3rem;
      border-top: 0.5px solid var(--faint);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    footer span {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: #ccc;
      text-transform: uppercase;
    }

    /* MOBILE */
    @media (max-width: 600px) {
      nav { padding: 1.5rem; }
      .nav-links { gap: 1.5rem; }
      footer { padding: 1.5rem; flex-direction: column; gap: 0.5rem; text-align: center; }
    }
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="/">edward kot</a>
    <ul class="nav-links">
      <li><a href="works.html">Works</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="collaborate.html">Collaborate</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <main class="hero">
    <p class="hero-eyebrow">Photographer &nbsp;·&nbsp; Milan &nbsp;·&nbsp; Europe</p>
    <h1 class="hero-name">Edward<br><em>Kot</em></h1>
    <div class="hero-rule"></div>
    <a class="hero-ig" href="https://instagram.com/edwardkot" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <rect x="2" y="2" width="20" height="20" rx="5"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
      </svg>
      @edwardkot
    </a>
  </main>

  <footer>
    <span>© 2025 Edward Kot</span>
    <span>edwardkot.com</span>
  </footer>
</body>
</html>
