backend:
  name: github
  repo: EdwardKot/edwardkot-site
  branch: main
  base_url: https://cms-oauth.geshenfeng1.workers.dev

media_folder: "static/uploads"
public_folder: "https://pub-441ec5dec2f94cafac68925856863ac2.r2.dev"

collections:
  - name: "works"
    label: "Works"
    files:
      - label: "Photo Library"
        name: "works"
        file: "_data/works.json"
        fields:
          - label: "Photos"
            name: "items"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "File (R2 key)", name: "file", widget: "string", hint: "R2 object key, e.g. work/display/work-001.jpg" }
              - { label: "Alt text", name: "alt", widget: "string", required: false, hint: "Describe the actual photo in 10-15 words, e.g. Rainy evening street scene, Milan - smartphone sample image by Edward Kot." }
              - { label: "Year", name: "year", widget: "string", required: false }
